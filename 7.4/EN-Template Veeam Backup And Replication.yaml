                    - $.JOBPROCESSEDSIZE
              master_item:
                key: 'veeam.Jobs.Info[''{#JOBTYPEID}'',''{#JOBID}'']'
              tags:
                - tag: Application
                  value: 'Veeam Backup and Replication'
                - tag: 'Backup Job'
                  value: '{#JOBNAME}'
                - tag: 'Backup Type'
                  value: '{#JOBTYPENAME}'
            - uuid: f579994c20af4cfdbb02231f6c53b5cd
              name: 'Backup stored size {#JOBTYPENAME}: {#JOBNAME}'
              type: DEPENDENT
              key: 'veeam.Jobs.Size.Stored[''{#JOBTYPEID}'',''{#JOBID}'']'
              history: 90d
              units: B
              preprocessing:
                - type: JSONPATH
                  parameters:
                    - $.JOBSTOREDSIZE
              master_item:
                key: 'veeam.Jobs.Info[''{#JOBTYPEID}'',''{#JOBID}'']'
              tags:
                - tag: Application
                  value: 'Veeam Backup and Replication'
                - tag: 'Backup Job'
                  value: '{#JOBNAME}'
                - tag: 'Backup Type'
                  value: '{#JOBTYPENAME}'
            - uuid: d43da794cd0a4923b8e481f0953c2cf0
              name: 'Backup total used size {#JOBTYPENAME}: {#JOBNAME}'
              type: DEPENDENT
              key: 'veeam.Jobs.Size.TotalUsed[''{#JOBTYPEID}'',''{#JOBID}'']'
              history: 90d
              units: B
              preprocessing:
                - type: JSONPATH
                  parameters:
                    - $.JOBTOTALUSEDSIZE
              master_item:
                key: 'veeam.Jobs.Info[''{#JOBTYPEID}'',''{#JOBID}'']'
              tags:
