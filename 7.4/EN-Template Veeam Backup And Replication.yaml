              master_item:
                key: 'veeam.Jobs.Info[''{#JOBTYPEID}'',''{#JOBID}'']'
              tags:
                - tag: Application
                  value: 'Veeam Backup and Replication'
                - tag: 'Backup Job'
                  value: '{#JOBNAME}'
                - tag: 'Backup Type'
                  value: '{#JOBTYPENAME}'
            - uuid: 1a9d364b6da24db6927eb085540bcb05
              name: 'Backup backed up size {#JOBTYPENAME}: {#JOBNAME}'
              type: DEPENDENT
              key: 'veeam.Jobs.Size.Backedup[''{#JOBTYPEID}'',''{#JOBID}'']'
              history: 90d
              units: B
              preprocessing:
                - type: JSONPATH
                  parameters:
                    - $.JOBBACKEDUPSIZE
              master_item:
                key: 'veeam.Jobs.Info[''{#JOBTYPEID}'',''{#JOBID}'']'
