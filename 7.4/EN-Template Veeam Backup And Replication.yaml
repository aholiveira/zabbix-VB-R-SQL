                - tag: 'Backup Type'
                  value: '{#JOBTYPENAME}'
            - uuid: 0742ac00da44467c9924f440186c5e56
              name: 'Is Retry {#JOBNAME}'
              type: DEPENDENT
              key: 'veeam.Jobs.Retry[''{#JOBTYPEID}'',''{#JOBID}'']'
              history: 90d
              preprocessing:
                - type: JSONPATH
                  parameters:
                    - $.JOBRETRY
